<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra Cứu 52 Lá Bài Căn Số</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Be+Vietnam+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0b14;
    --surface:  #16121f;
    --card-bg:  #1c1729;
    --border:   #2e2545;
    --accent:   #c9a84c;
    --accent2:  #7c5cbf;
    --text:     #e8e0f0;
    --muted:    #8878a8;
    --co:       #e85d7a;
    --ro:       #f4a540;
    --chuon:    #5ba8e0;
    --bich:     #8878a8;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    min-height: 100vh;
  }

  /* ── STARS ── */
  .stars {
    position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
  }
  .star {
    position: absolute; border-radius: 50%; background: #fff;
    animation: twinkle var(--d) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle { to { opacity: var(--o); } }

  /* ── LAYOUT ── */
  .wrapper {
    position: relative; z-index: 1;
    max-width: 820px; margin: 0 auto;
    padding: 48px 20px 80px;
  }

  /* ── HEADER ── */
  header { text-align: center; margin-bottom: 40px; }

  .ornament {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 16px;
  }
  .ornament-line {
    width: 60px; height: 1px; background: linear-gradient(to right, transparent, var(--accent));
  }
  .ornament-line.right { background: linear-gradient(to left, transparent, var(--accent)); }
  .ornament svg { width: 28px; height: 28px; }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1.2;
    background: linear-gradient(135deg, #d4a84b 0%, #f0d080 50%, #b8864a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative; margin-bottom: 12px;
  }
  .search-icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px 14px 46px;
    font-size: 1rem;
    font-family: 'Be Vietnam Pro', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
  }

  /* ── FILTERS ── */
  .filters {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 28px;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.8rem;
    font-family: 'Be Vietnam Pro', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { color: #0d0b14; font-weight: 500; }
  .filter-btn[data-suit="all"].active   { background: var(--accent); border-color: var(--accent); }
  .filter-btn[data-suit="Cơ"].active   { background: var(--co); border-color: var(--co); }
  .filter-btn[data-suit="Rô"].active   { background: var(--ro); border-color: var(--ro); }
  .filter-btn[data-suit="Chuồn"].active { background: var(--chuon); border-color: var(--chuon); }
  .filter-btn[data-suit="Bích"].active  { background: var(--bich); border-color: var(--bich); color: var(--text); }

  /* ── COUNT ── */
  .count {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 16px;
    letter-spacing: 0.06em;
  }

  /* ── GRID ── */
  #result {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    cursor: default;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
  }
  .card[data-suit="Cơ"]::before    { background: var(--co); }
  .card[data-suit="Rô"]::before    { background: var(--ro); }
  .card[data-suit="Chuồn"]::before { background: var(--chuon); }
  .card[data-suit="Bích"]::before  { background: var(--bich); }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.4);
  }
  .card[data-suit="Cơ"]:hover    { border-color: var(--co); }
  .card[data-suit="Rô"]:hover    { border-color: var(--ro); }
  .card[data-suit="Chuồn"]:hover { border-color: var(--chuon); }
  .card[data-suit="Bích"]:hover  { border-color: var(--bich); }

  .card-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px;
  }

  .card-symbol {
    width: 38px; height: 38px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .card[data-suit="Cơ"]    .card-symbol { background: rgba(232,93,122,0.15); }
  .card[data-suit="Rô"]    .card-symbol { background: rgba(244,165,64,0.15); }
  .card[data-suit="Chuồn"] .card-symbol { background: rgba(91,168,224,0.15); }
  .card[data-suit="Bích"]  .card-symbol { background: rgba(136,120,168,0.15); }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
  }

  .suit-label {
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .card[data-suit="Cơ"]    .suit-label { color: var(--co); }
  .card[data-suit="Rô"]    .suit-label { color: var(--ro); }
  .card[data-suit="Chuồn"] .suit-label { color: var(--chuon); }
  .card[data-suit="Bích"]  .suit-label { color: var(--bich); }

  .card-meaning {
    font-size: 0.875rem;
    line-height: 1.65;
    color: #c4b8dc;
  }

  /* ── EMPTY STATE ── */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty svg { opacity: 0.3; margin-bottom: 16px; }
  .empty p { font-size: 0.9rem; }

  @media (max-width: 480px) {
    #result { grid-template-columns: 1fr; }
    .filters { gap: 6px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrapper">
  <header>
    <div class="ornament">
      <div class="ornament-line"></div>
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 2L16.5 9.5H24.5L18.2 14.2L20.7 21.7L14 17L7.3 21.7L9.8 14.2L3.5 9.5H11.5L14 2Z" fill="#c9a84c" opacity="0.9"/>
      </svg>
      <div class="ornament-line right"></div>
    </div>
    <h1>Tra Cứu Lá Bài Căn Số</h1>
    <p class="subtitle">52 lá bài · Tâm linh & Căn số</p>
  </header>

  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search" placeholder="Tìm kiếm lá bài (Át Cơ, 7 Bích, Q Rô...)">
  </div>

  <div class="filters">
    <button class="filter-btn active" data-suit="all">Tất cả</button>
    <button class="filter-btn" data-suit="Cơ">♥ Cơ</button>
    <button class="filter-btn" data-suit="Rô">♦ Rô</button>
    <button class="filter-btn" data-suit="Chuồn">♣ Chuồn</button>
    <button class="filter-btn" data-suit="Bích">♠ Bích</button>
  </div>

  <div class="count" id="count">52 lá bài</div>
  <div id="result"></div>
</div>

<script>
/* ── STARS ── */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 90; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    --d:${(Math.random()*4+2).toFixed(1)}s;
    --o:${(Math.random()*0.6+0.1).toFixed(2)};
    animation-delay:${(Math.random()*6).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

const cards = [
  /* CƠ */

  { name:"4 Cơ",   suit:"Cơ", label:"Gia tiên · Tình cảm · Tâm linh", symbol:"♥", meaning:"Gia tiên về mức độ trung bình. Nên cúng thường xuyên." },
  { name:"5 Cơ",   suit:"Cơ", label:"Gia tiên · Tình cảm · Tâm linh", symbol:"♥", meaning:"Tâm sáng, căn nhẹ. Có người theo nhưng vẫn cần học hỏi." },
  { name:"6 Cơ",   suit:"Cơ", label:"Gia tiên · Tình cảm · Tâm linh", symbol:"♥", meaning:"Có thể là căn tu hoặc người được mượn căn, có duyên ra trình." },
  { name:"7 Cơ",   suit:"Cơ", label:"Gia tiên · Tình cảm · Tâm linh", symbol:"♥", meaning:"Gia tiên báo về những tình duyên không suôn sẻ, cần cẩn trọng." },
  { name:"8 Cơ",   suit:"Cơ", label:"Gia tiên · Tình cảm · Tâm linh", symbol:"♥", meaning:"Căn nặng hoặc từng có kiếp tu hành. Có thử thách tâm linh." },
  { name:"9 Cơ",   suit:"Cơ", label:"Gia tiên · Tình cảm · Tâm linh", symbol:"♥", meaning:"Có duyên với Phật – Thánh. Nên cẩn trọng lời ăn tiếng nói." },
  { name:"10 Cơ",  suit:"Cơ", label:"Gia tiên · Tình cảm · Tâm linh", symbol:"♥", meaning:"Căn rõ ràng, nếu ra trình đúng cách thì sẽ được soi đường." },
  { name:"J Cơ",   suit:"Cơ", label:"Gia tiên · Tình cảm · Tâm linh", symbol:"♥", meaning:"Người trẻ có căn, trái đồng, thường bị âm theo." },
  { name:"Q Cơ",   suit:"Cơ", label:"Gia tiên · Tình cảm · Tâm linh", symbol:"♥", meaning:"Có căn hoặc linh tiền theo, thường là cô Mẫu, Dưỡng bà." },
  { name:"K Cơ",   suit:"Cơ", label:"Gia tiên · Tình cảm · Tâm linh", symbol:"♥", meaning:"Căn nặng, gia tiên mạnh, có thể là trưởng dòng căn hoặc học pháp." },
  /* RÔ */
  { name:"Át Rô",  suit:"Rô", label:"Tiền tài · Sự nghiệp · Thử thách", symbol:"♦", meaning:"Có nghiệp nặng từ tiền kiếp hoặc gia đình. Căn trên nghiệp trần." },
  { name:"2 Rô",   suit:"Rô", label:"Tiền tài · Sự nghiệp · Thử thách", symbol:"♦", meaning:"Cân bằng giữa vật trần và tâm linh. Dễ bị dao động." },

  { name:"K Rô",   suit:"Rô", label:"Tiền tài · Sự nghiệp · Thử thách", symbol:"♦", meaning:"Người từng làm quan/lãnh đạo, nhưng nghiệp danh lợi rất nặng." },

  { name:"Át Chuồn",  suit:"Chuồn", label:"Linh khí · Tâm linh · Căn lặng", symbol:"♣", meaning:"Có căn tu hoặc từng là người tu, tâm linh hoặc tông tu từ tiền kiếp." },
  { name:"2 Chuồn",   suit:"Chuồn", label:"Linh khí · Tâm linh · Căn lặng", symbol:"♣", meaning:"Dấu hiệu cân bằng âm dương, từng lang thang giữa hai thế giới." },
  { name:"3 Chuồn",   suit:"Chuồn", label:"Linh khí · Tâm linh · Căn lặng", symbol:"♣", meaning:"Có thể từng bị bẻ căn, căn nặng hoặc không theo đúng đường." },

  { name:"10 Bích",  suit:"Bích", label:"Âm khí · Tai ương · Căn khổ", symbol:"♠", meaning:"Căn sát căn thầy, nhưng bị kìm hãm do nghiệp âm quá nặng." },
  { name:"J Bích",   suit:"Bích", label:"Âm khí · Tai ương · Căn khổ", symbol:"♠", meaning:"Người hay bị bóng đè, mê man, căn nặng nhưng chưa thông." },
  { name:"Q Bích",   suit:"Bích", label:"Âm khí · Tai ương · Căn khổ", symbol:"♠", meaning:"Nữ có căn đau khổ, thường bị lôi kéo, thử thách trong tâm linh." },
  { name:"K Bích",   suit:"Bích", label:"Âm khí · Tai ương · Căn khổ", symbol:"♠", meaning:"Căn thầy, từng làm việc lớn ở âm giới, nhưng hiện kiếp bị cản trở nặng." }
];

/* ── STATE ── */
let activeSuit = 'all';
const searchEl = document.getElementById('search');
const resultEl = document.getElementById('result');
const countEl  = document.getElementById('count');

/* ── RENDER ── */
function render() {
  const key  = searchEl.value.toLowerCase().trim();
  const list = cards.filter(c => {
    const matchSuit   = activeSuit === 'all' || c.suit === activeSuit;
    const matchSearch = !key || c.name.toLowerCase().includes(key) || c.meaning.toLowerCase().includes(key);
    return matchSuit && matchSearch;
  });

  countEl.textContent = list.length + ' lá bài';

  if (list.length === 0) {
    resultEl.innerHTML = `
      <div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#8878a8" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>Không tìm thấy lá bài phù hợp.</p>
      </div>`;
    return;
  }

  resultEl.innerHTML = list.map(c => `
    <div class="card" data-suit="${c.suit}">
      <div class="card-header">
        <div class="card-symbol">${c.symbol}</div>
        <div>
          <div class="card-name">${c.name}</div>
          <div class="suit-label">${c.label}</div>
        </div>
      </div>
      <div class="card-meaning">${c.meaning}</div>
    </div>
  `).join('');
}

/* ── FILTERS ── */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeSuit = btn.dataset.suit;
    render();
  });
});

searchEl.addEventListener('input', render);

/* ── INIT ── */
render();
</script>
</body>
</html>
